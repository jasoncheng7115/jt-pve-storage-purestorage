name: Build Debian Package

# Manually-triggered .deb build. Mirrors what `make deb` does locally so
# release engineers and contributors can grab a packaged build directly
# from the GitHub Actions UI without setting up a Debian dev box.
#
# Original workflow contributed by @pulipulichen (issue #4).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-deb:
    name: Build .deb
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential debhelper fakeroot

      - name: Run plugin Perl syntax checks
        run: make test

      - name: Build Debian package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect Debian package
        run: |
          mkdir -p artifacts
          cp ../jt-pve-storage-purestorage_*_all.deb artifacts/
          ls -la artifacts/

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: jt-pve-storage-purestorage-deb
          path: artifacts/jt-pve-storage-purestorage_*_all.deb
          if-no-files-found: error
          retention-days: 30
